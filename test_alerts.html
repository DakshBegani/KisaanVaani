<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Alert Test</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .input-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .alert-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .alert-warning {
            background-color: #fff3cd;
            border-color: #ffc107;
        }
        .alert-info {
            background-color: #d1ecf1;
            border-color: #17a2b8;
        }
        .alert-error {
            background-color: #f8d7da;
            border-color: #dc3545;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background-color: #e9ecef;
        }
        .connected {
            color: green;
        }
        .disconnected {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Weather Alert Service Test</h1>
    
    <div class="status">
        Connection Status: <span id="status" class="disconnected">Disconnected</span>
    </div>

    <div class="input-group">
        <label for="latitude">Latitude:</label>
        <input type="number" id="latitude" value="28.7041" step="0.0001" placeholder="e.g., 28.7041">
    </div>

    <div class="input-group">
        <label for="longitude">Longitude:</label>
        <input type="number" id="longitude" value="77.1025" step="0.0001" placeholder="e.g., 77.1025">
    </div>

    <div class="input-group">
        <label for="userId">User ID:</label>
        <input type="text" id="userId" value="farmer_123" placeholder="e.g., farmer_123">
    </div>

    <button onclick="getAlert()">Get Weather Alert</button>

    <div id="alertContainer"></div>

    <script>
        // Connect to WebSocket
        const socket = io('http://localhost:5002');

        socket.on('connect', () => {
            console.log('Connected to weather alert service');
            document.getElementById('status').textContent = 'Connected';
            document.getElementById('status').className = 'connected';
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from weather alert service');
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('status').className = 'disconnected';
        });

        socket.on('connection_response', (data) => {
            console.log('Connection response:', data);
        });

        socket.on('weather_alert', (alert) => {
            console.log('Weather alert received:', alert);
            displayAlert(alert);
        });

        socket.on('alert_error', (error) => {
            console.error('Alert error:', error);
            displayError(error.message);
        });

        function getAlert() {
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);
            const userId = document.getElementById('userId').value;

            if (isNaN(latitude) || isNaN(longitude)) {
                alert('Please enter valid latitude and longitude');
                return;
            }

            console.log('Requesting alert for:', { latitude, longitude, userId });
            socket.emit('get_alert', {
                latitude: latitude,
                longitude: longitude,
                user_id: userId
            });
        }

        function displayAlert(alert) {
            const container = document.getElementById('alertContainer');
            const alertClass = alert.alert_type === 'warning' ? 'alert-warning' : 'alert-info';
            
            container.innerHTML = `
                <div class="alert-box ${alertClass}">
                    <h3>Weather Alert</h3>
                    <p><strong>Type:</strong> ${alert.alert_type}</p>
                    <p><strong>Risk Level:</strong> ${alert.risk_level}</p>
                    <p><strong>Message:</strong> ${alert.message}</p>
                    <p><strong>Advice:</strong> ${alert.advice}</p>
                    <p><strong>User ID:</strong> ${alert.user_id}</p>
                    <p><strong>Location:</strong> ${alert.latitude}, ${alert.longitude}</p>
                </div>
            `;
        }

        function displayError(message) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert-box alert-error">
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
